<!-- Path: app/templates/photos/edit.html -->

{% extends "base.html" %}
{% block title %}Редактировать медиа #{{ photo.id }}{% endblock %}

{% block content %}
<div class="container">
    <h2>Редактировать медиа #{{ photo.id }}</h2>
    <form method="POST">
        <div class="form-group">
            <label>Клиент</label>
            <select name="client_id" class="form-control">
                <option value="">Без клиента</option>
                {% for client in clients %}
                <option value="{{ client.id }}" {% if photo.client_id == client.id %}selected{% endif %}>{{ client.full_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Заявка</label>
            <select name="request_id" class="form-control">
                <option value="">Без заявки</option>
                {% for req in requests %}
                <option value="{{ req.id }}" {% if photo.request_id == req.id %}selected{% endif %}>{{ req.request_number }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Оборудование</label>
            <select name="equipment_id" class="form-control">
                <option value="">Без оборудования</option>
                {% for equip in equipment %}
                <option value="{{ equip.id }}" {% if photo.equipment_id == equip.id %}selected{% endif %}>{{ equip.serial_number }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Вид оборудования</label>
            <input type="text" name="equipment_type" value="{{ photo.equipment_type or '' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" class="form-control">{{ photo.description or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
    </form>
</div>
{% endblock %}
